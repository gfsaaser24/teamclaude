appId: com.teamclaude.desktop
productName: TeamClaude
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
# Bundle the (zero-dependency) teamclaude proxy so the packaged app runs it
# itself with Electron's own Node — no external `node` and no checkout needed.
extraResources:
  - from: ../src
    to: app-proxy
  - from: ../package.json
    to: package.json
asarUnpack:
  - resources/**
win:
  executableName: TeamClaude
  icon: build/icon.ico
  target:
    - nsis
    - portable
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: TeamClaude
  uninstallDisplayName: TeamClaude
  createDesktopShortcut: always
  runAfterFinish: true
portable:
  artifactName: TeamClaude-${version}-portable.${ext}
npmRebuild: false
